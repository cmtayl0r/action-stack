<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Action Stack</title>
        <link rel="stylesheet" href="styles/main.css" />
        <!-- <script type="module" src="scripts/main.js"></script> -->
        <script defer src="scripts/main.js"></script>
    </head>
    <body>
        <h1>Action Stack</h1>
        <!-- All Tasks -->
        <div class="all-tasks">
            <h2 class="task-list-title">My lists</h2>
            <ul class="task-list" data-lists>
                <!-- <li class="list-name active-list">Youtube</li>
                <li class="list-name">Work</li>
                <li class="list-name">Grocery</li> -->
            </ul>

            <form action="" data-new-list-form>
                <input
                    type="text"
                    class="new list"
                    data-new-list-input
                    placeholder="new list name"
                    aria-label="new list name"
                />
                <button class="btn create" aria-label="create new list">
                    +
                </button>
            </form>
        </div>

        <!-- Todo List -->
        <div class="todo-list" data-list-display-container>
            <!-- Todo Header -->
            <div class="todo-header">
                <h2 class="list-title" data-list-title>YouTube</h2>
                <p class="task-count" data-list-count></p>
            </div>
            <!-- Todo Body -->
            <div class="todo-body">
                <!-- Tasks -->
                <div class="tasks" data-tasks></div>
                <!-- New Task -->
                <div class="new-task-creator">
                    <form action="" data-new-task-form>
                        <input
                            type="text"
                            class="new task"
                            placeholder="new task name"
                            data-new-task-input
                            aria-label="new task name"
                        />
                        <button class="btn create" aria-label="create new task">
                            +
                        </button>
                    </form>
                </div>
                <!-- Delete -->
                <div class="delete-stuff">
                    <button class="btn delete" data-clear-complete-tasks-button>
                        Clear completed tasks
                    </button>
                    <button class="btn delete" data-delete-list-button>
                        Delete list
                    </button>
                </div>
            </div>
        </div>

        <!-- Template not visible in HTML but referenced in JavaScript -->
        <template id="task-template">
            <div class="task">
                <input type="checkbox" />
                <label>
                    <span class="custom-checkbox"></span>
                </label>
            </div>
        </template>
    </body>
</html>
